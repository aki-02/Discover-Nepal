<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In - Discover Nepal</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>

<header>
    <nav class="navbar">
    <h1 class="logo">
        <a href="./index.html">Discover Nepal</a>
    </h1>
      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./destinations.html">Destinations</a></li>
        <li><a href="./contact.html">Contact</a></li>
        <li><a href="./Booking.html">Book Now</a></li>
        <li><a href="./login.html">Log In</a></li>
      </ul>
    </nav>
</header>

<section class="login">
    <h2>Log In</h2>
    <form action="/login" method="post" class="login-form">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>
    <p class="no-account">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>

    <div id="signup-section" style="display:none;">
        <h2>Sign Up</h2>
        <form action="/signup" method="post" class="signup-form">
            <input type="text" name="name" placeholder="Full name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm" placeholder="Confirm password" required>
            <button type="submit">Sign Up</button>
            <p class="have-account">Already have an account? <a href="#" id="show-login">Log in</a></p>
        </form>
    </div>
</section>

<script src="./script.js"></script>
</body>
</html>
