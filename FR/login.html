<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In - Discover Nepal</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>

<header>
    <nav class="navbar">
    <h1 class="logo">
        <a href="./index.html">Discover Nepal</a>
    </h1>
      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./destinations.html">Destinations</a></li>
        <li><a href="./contact.html">Contact</a></li>
        <li><a href="./aboutus.html">About Us</a></li>
        <li><a href="./Booking.html">Book Now</a></li>
        <li><a href="./login.html">Log In</a></li>
      </ul>
    </nav>
</header>

<section class="hero page-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1>Log In to Your Account</h1>
        <p>Continue your Nepal adventure</p>
    </div>
</section>

<section class="login">
    <div class="login-wrapper">
    <div id="login-section">
        <h2>Log In</h2>
        <form class="login-form">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <p class="no-account">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
    </div>

    <div id="signup-section" style="display:none;">
        <h2>Sign Up</h2>
        <form class="signup-form">
            <input type="text" name="name" placeholder="Full name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm" placeholder="Confirm password" required>
            <button type="submit">Sign Up</button>
            <p class="have-account">Already have an account? <a href="#" id="show-login">Log in</a></p>
        </form>
    </div>
    </div>
</section>

<script>
    // Toggle between login and signup sections
    document.getElementById('show-signup').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('signup-section').style.display = 'block';
    });

    document.getElementById('show-login').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('signup-section').style.display = 'none';
    });
</script>

<script src="./script.js"></script>
<script src="./auth-system.js"></script>
</body>
</html>
