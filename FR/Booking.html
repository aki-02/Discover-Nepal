<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking - Discover Nepal</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body>

<header>
    <nav class="navbar">
    <h1 class="logo">
        <a href="./index.html">Discover Nepal</a>
    </h1>
      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./destinations.html">Destinations</a></li>
        <li><a href="./contact.html">Contact</a></li>
        <li><a href="./aboutus.html">About Us</a></li>
        <li><a href="./Booking.html">Book Now</a></li>
                <li id="admin-link-item" style="display: none;"><a href="./admin.html">Admin Portal</a></li>
        <li id="auth-link-item"><a href="./login.html">Log In</a></li>
      </ul>
    </nav>
</header>

<section class="booking">
    <h2>Book Your Trip!</h2>
        <form class="booking-form">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="destination" placeholder="Desired Destination" required>
                <input type="date" name="travel_date" placeholder="Travel Date">
                <input type="number" name="travelers" min="1" max="20" value="1" placeholder="Number of Travelers" required>
                <textarea name="notes" rows="4" placeholder="Special requests (optional)"></textarea>
        <button type="submit">Book Now</button>
    </form>
</section>



<script src="./auth-system.js"></script>
</body>
</html>
