<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discover Nepal</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
    <nav class="navbar">
    <h1 class="logo">
        <a href="index.html">Discover Nepal</a>
    </h1>
      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./destinations.html">Destinations</a></li>
        <li><a href="./contact.html">Contact</a></li>
        <li><a href="./aboutus.html">About Us</a></li>
        <li><a href="./Booking.html">Book Now</a></li>
        <li><a href="./wishlist.html">Wishlist</a></li>
        <li><a href="./login.html">Log In</a></li>
      </ul>
    </nav>
</header>

<section class="hero">
    <h2 class="hero-text">Explore the Beauty of Nepal!</h2>
</section>

<section class="featured">
    <h2>Destinations</h2>
    <div class="cards">
        <div class="card">
            <div class="card-image-container">
                <img src="./Images/kathmandu.jpg">
                <button class="heart-btn" data-destination="Kathmandu" data-image="./Images/kathmandu.jpg" data-type="City" data-description="The capital city of Nepal" data-link="./Paragraph/kathmandu.html">🤍</button>
            </div>
            <a href="./Paragraph/kathmandu.html">Kathmandu</a>
        </div>
        <div class="card">
            <div class="card-image-container">
                <img src="./Images/pokhara.jpg">
                <button class="heart-btn" data-destination="Pokhara" data-image="./Images/pokhara.jpg" data-type="City" data-description="The lakeside city" data-link="./Paragraph/pokhara.html">🤍</button>
            </div>
            <a href="./Paragraph/pokhara.html">Pokhara</a>
        </div>
        <div class="card">
            <div class="card-image-container">
                <img src="./Images/lumbini.jpg">
                <button class="heart-btn" data-destination="Lumbini" data-image="./Images/lumbini.jpg" data-type="Religious Site" data-description="Birthplace of Buddha" data-link="./Paragraph/lumbini.html">🤍</button>
            </div>
            <a href="./Paragraph/lumbini.html">Lumbini</a>
        </div>
        <div class="card">
            <div class="card-image-container">
                <img src="./Images/bhaktapur.jpg">
                <button class="heart-btn" data-destination="Bhaktapur" data-image="./Images/bhaktapur.jpg" data-type="City" data-description="Ancient city with heritage sites" data-link="./Paragraph/bhaktapur.html">🤍</button>
            </div>
            <a href="./Paragraph/bhaktapur.html">Bhaktapur</a>
        </div>
        <div class="card">
            <div class="card-image-container">
                <img src="./Images/mustang.jpg">
                <button class="heart-btn" data-destination="Mustang" data-image="./Images/mustang.jpg" data-type="Region" data-description="Remote mountain region" data-link="./Paragraph/mustang.html">🤍</button>
            </div>
            <a href="./Paragraph/mustang.html">Mustang</a>
        </div>
        <div class="card">
            <div class="card-image-container">
                <img src="./Images/chitwan.jpg">
                <button class="heart-btn" data-destination="Chitwan" data-image="./Images/chitwan.jpg" data-type="National Park" data-description="Wildlife sanctuary" data-link="./Paragraph/chitwan.html">🤍</button>
            </div>
            <a href="./Paragraph/chitwan.html">Chitwan</a>
        </div>
    </div>
</section>

<section class="contact">
    <h2>Contact Us</h2>
    <form action="#" method="post" class="contact-form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <input type="phone" name="phone" placeholder="Your Phone Number" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<script src="./wishlist.js"></script>
</body>
</html>
